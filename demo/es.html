<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Demo chat — GestorLocal</title>
<link rel="stylesheet" href="../assets/chat.css">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #ece5dd; }
  .wa-phone { width: 100%; height: 100%; }
</style>
<script>
  // recorder support: ?zoom=3 renders the 360x640 layout on a 1080x1920 viewport
  (function () {
    var z = new URLSearchParams(location.search).get("zoom");
    if (z) document.documentElement.style.zoom = z;
  })();
</script>
</head>
<body>

<div class="wa-phone">
  <div class="wa-statusbar">
    <span>22:14</span>
    <span class="wa-sb-icons">
      <svg viewBox="0 0 24 24"><path d="M2 22h20V2L2 22z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 21c5 0 9-4 9-9s-4-9-9-9-9 4-9 9 4 9 9 9zm0-2.2A6.8 6.8 0 1 1 12 5.2a6.8 6.8 0 0 1 0 13.6z" opacity="0"/><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </span>
  </div>

  <div class="wa-header">
    <span class="wa-back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </span>
    <span class="wa-avatar">CA</span>
    <div class="wa-peer">
      <div class="wa-peer-name">Clínica Aura Estética</div>
      <div class="wa-peer-status">en línea</div>
    </div>
    <div class="wa-header-icons">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24 11.36 11.36 0 0 0 3.57.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.36 11.36 0 0 0 .57 3.57 1 1 0 0 1-.25 1.02l-2.2 2.2z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm0 6a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
    </div>
  </div>

  <div class="wa-messages">
    <div class="wa-day">Hoy</div>
    <div class="wa-e2e">🔒 Los mensajes están cifrados de extremo a extremo. Nadie fuera de este chat puede leerlos.</div>
  </div>

  <div class="wa-composer">
    <div class="wa-input">
      <svg viewBox="0 0 24 24"><path d="M12 22a10 10 0 1 1 0-20 10 10 0 0 1 0 20zm0-18a8 8 0 1 0 0 16 8 8 0 0 0 0-16zM8.5 11a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm7 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm-8.2 3.3a.75.75 0 0 1 1.05-.15 6.5 6.5 0 0 0 7.3 0 .75.75 0 0 1 .9 1.2 8 8 0 0 1-9.1 0 .75.75 0 0 1-.15-1.05z"/></svg>
      <span>Escribí un mensaje</span>
    </div>
    <div class="wa-mic">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
    </div>
  </div>

  <div class="wa-endcard">
    <div class="wa-endcard-inner">
      <p class="wa-end-lead">A las 8:00&nbsp;AM, la clínica abre y ya tiene la cita agendada y el lead calificado.</p>
      <p class="wa-end-strong"><em>Cero esfuerzo.</em><br>Cero consultas perdidas de madrugada.</p>
    </div>
  </div>
</div>

<script>
window.CHAT_CONFIG = {
  statusOnline: "en línea",
  statusTyping: "escribiendo…",
  messages: [
    { from: "lead", gap: 500, time: "22:14",
      html: "Hola! Vi en Instagram lo de depilación láser. ¿Cuánto sale para piernas completas?" },
    { from: "bot", gap: 1500, time: "22:14",
      html: "¡Hola! 👋 Gracias por escribir. Piernas completas las hacemos en sesiones; el bono de 6 sesiones está en 390&nbsp;€, o sesión suelta 75&nbsp;€. ¿Es para vos o querés combinarlo con otra zona?" },
    { from: "lead", gap: 3400, time: "22:15",
      html: "Para mí. Quizás piernas y axilas." },
    { from: "bot", gap: 1300, time: "22:15",
      html: "Perfecto, esa combinación tiene un pack con descuento. Para darte el precio exacto y ver tu tipo de piel, lo ideal es una valoración gratuita de 15 min. ¿Te viene mejor <strong>mañana 11:00</strong> o <strong>el jueves 17:30</strong>?" },
    { from: "lead", gap: 3200, time: "22:16",
      html: "Jueves 17:30." },
    { from: "bot", gap: 1200, time: "22:16",
      html: "Listo ✅ Te agendé la valoración el <strong>jueves 17:30</strong> en Calle Velázquez 27. Te llega un recordatorio el día anterior. Cualquier cosa me escribís por acá. ¡Nos vemos!" }
  ],
  endcardGap: 2800,
  endcardHold: 5200
};
</script>
<script src="../assets/chat.js"></script>
</body>
</html>
